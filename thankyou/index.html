<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Brennan Keating</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Thank you for contacting Brennan Keating. We will be in touch soon.">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="https://use.typekit.net/qen5jnd.css">
    <link rel="stylesheet" href="../styles.css?v=3">
    <style>
        /* Thank You Page Specific Styles */
        .thankyou-page {
            min-height: 100vh;
            padding: 10rem 4rem 6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thankyou-container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .thankyou-container h1 {
            font-family: var(--font-headline);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2rem;
            color: var(--white);
        }

        .thankyou-container p {
            font-size: 1.25rem;
            color: var(--gray-400);
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .thankyou-container .contact-details {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .thankyou-container .contact-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .thankyou-container .contact-item-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray-500);
        }

        .thankyou-container .contact-item-value {
            font-size: 1.125rem;
            color: var(--white);
        }

        .thankyou-container .contact-socials {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .thankyou-container .contact-socials a {
            width: 45px;
            height: 45px;
            border: 1px solid var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .thankyou-container .contact-socials a[aria-label="YouTube"] img {
            width: 28px;
            height: 28px;
        }

        .thankyou-container .contact-socials a[aria-label="YouTube"]:hover {
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }

        .thankyou-container .contact-socials a[aria-label="Instagram"]:hover {
            border-color: #c13584;
            background: rgba(193, 53, 132, 0.05);
        }

        .thankyou-container .contact-socials a[aria-label="LinkedIn"]:hover {
            border-color: #0077b5;
            background: rgba(0, 119, 181, 0.05);
        }

        .thankyou-container .contact-socials img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            filter: brightness(0) invert(0.55);
            transition: filter 0.3s ease;
        }

        .thankyou-container .contact-socials a[aria-label="YouTube"]:hover img {
            filter: brightness(0) saturate(100%) invert(15%) sepia(97%) saturate(7481%) hue-rotate(357deg) brightness(103%) contrast(117%);
        }

        .thankyou-container .contact-socials a[aria-label="Instagram"]:hover img {
            filter: brightness(0) saturate(100%) invert(28%) sepia(72%) saturate(1200%) hue-rotate(291deg) brightness(95%) contrast(93%);
        }

        .thankyou-container .contact-socials a[aria-label="LinkedIn"]:hover img {
            filter: brightness(0) saturate(100%) invert(27%) sepia(95%) saturate(549%) hue-rotate(168deg) brightness(94%) contrast(103%);
        }

        .back-home-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            background: var(--white);
            color: var(--black);
            transition: all 0.3s ease;
            margin-top: 2rem;
        }

        .back-home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 968px) {
            .thankyou-page {
                padding: 8rem 2rem 4rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo"><img src="../images/brennankeating.svg" alt="Brennan Keating"></a>
        <ul class="nav-links">
            <li><a href="../">Home</a></li>
            <li><a href="../projects/">Projects</a></li>
            <li><a href="../artwork/">Artwork</a></li>
            <li><a href="../products/">Products</a></li>
            <li><a href="../services/">Services</a></li>
            <li><a href="../contact/">Contact</a></li>
        </ul>
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Thank You Section -->
    <section class="thankyou-page">
        <div class="thankyou-container">
            <h1>Thank You</h1>
            <p>We will be in contact with you soon.</p>

            <div class="contact-details">
                <div class="contact-item">
                    <span class="contact-item-label">Location</span>
                    <span class="contact-item-value">Available Worldwide</span>
                </div>
            </div>

            <div class="contact-socials">
                <a href="https://www.instagram.com/brennankeating" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <img src="../images/social/instagram.webp" alt="Instagram">
                </a>
                <a href="https://www.youtube.com/@brennankeating" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
                    <img src="../images/social/youtube.webp" alt="YouTube">
                </a>
                <a href="https://www.linkedin.com/in/brennankeating/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                    <img src="../images/social/linkedin.webp" alt="LinkedIn">
                </a>
            </div>

            <a href="../" class="back-home-btn">Back to Home</a>
        </div>
    </section>

    <footer>
        <p class="footer-text">&copy; 2026 Brennan Keating. All rights reserved.</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>

    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 100) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Clear cart after successful Stripe purchase
        const _p = new URLSearchParams(location.search);
        if (_p.has('bk') || _p.has('session_id')) {
            localStorage.removeItem('bk_cart');
        }
    </script>
</body>
</html>
